<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .login-container{
      width:350px;
      background:#fff;
      padding:40px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .login-container h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:16px;
      outline:none;
    }

    .input-box input:focus{
      border-color:#4facfe;
    }

    .login-btn{
      width:100%;
      padding:12px;
      background:#4facfe;
      border:none;
      color:white;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#00c6fb;
    }

    .extra-links{
      text-align:center;
      margin-top:15px;
    }

    .extra-links a{
      text-decoration:none;
      color:#4facfe;
      font-size:14px;
    }

  </style>
</head>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <form>
      <div class="input-box">
        <input type="email" placeholder="Enter Email" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Enter Password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="extra-links">
        <p><a href="#">Forgot Password?</a></p>
      </div>
    </form>
  </div>

</body>
</html>
